<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
      position: relative;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #2d3a8c;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 0.3rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .auth-controls {
      position: absolute;
      top: 0;
      right: 0;
      font-size: 0.9rem;
    }

    /* ── Forms ── */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
      margin-bottom: 2rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group {
      margin-bottom: 0.9rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #4b5563;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea,
    select {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #111827;
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 80px; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #4f46e5;
      color: #fff;
    }

    .btn-primary:hover { background: #4338ca; }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-secondary:hover { background: #d1d5db; }

    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      padding: 0.35rem 0.8rem;
      font-size: 0.82rem;
    }

    .btn-danger:hover { background: #fecaca; }

    .btn-link {
      background: none;
      border: none;
      color: #4f46e5;
      cursor: pointer;
      font-weight: 600;
      padding: 0;
    }
    .btn-link:hover { text-decoration: underline; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #1e293b;
      color: #fff;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      font-size: 0.88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
    }

    #toast.show { opacity: 1; }

    /* ── Filters ── */
    .filters {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0 1rem;
      flex-wrap: wrap;
    }

    .filters label {
      margin: 0;
      font-weight: 600;
      white-space: nowrap;
    }

    .filters select { width: auto; }

    /* ── Task List ── */
    #tasks-list {
      display: grid;
      gap: 1rem;
    }

    .task-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto auto;
      gap: 0.4rem 1rem;
      border-left: 4px solid #e5e7eb;
      transition: border-color 0.25s, box-shadow 0.2s;
    }

    .task-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 6px 20px rgba(0,0,0,0.06);
    }

    .task-card[data-status="todo"]        { border-left-color: #94a3b8; }
    .task-card[data-status="in_progress"] { border-left-color: #f59e0b; }
    .task-card[data-status="done"]        { border-left-color: #22c55e; }

    .task-title {
      font-weight: 700;
      font-size: 1rem;
      color: #111827;
      grid-column: 1;
    }

    .task-desc {
      font-size: 0.88rem;
      color: #6b7280;
      grid-column: 1 / -1;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .task-meta {
      font-size: 0.78rem;
      color: #9ca3af;
      grid-column: 1;
      align-self: end;
    }

    .task-actions {
      grid-column: 2;
      grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .status-select {
      font-size: 0.8rem;
      padding: 0.3rem 0.5rem;
      border-radius: 20px;
      border: 1.5px solid #d1d5db;
      background: #f9fafb;
      cursor: pointer;
      width: auto;
    }

    .status-select:focus { border-color: #4f46e5; }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-todo        { background: #f1f5f9; color: #64748b; }
    .badge-in_progress { background: #fef3c7; color: #b45309; }
    .badge-done        { background: #dcfce7; color: #15803d; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #9ca3af;
    }

    .empty span { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
    }

    .pagination span {
      font-size: 0.95rem;
      font-weight: 500;
      color: #4b5563;
    }

    .hidden { display: none !important; }

    /* ── Auth Forms ── */
    .auth-container {
      max-width: 400px;
      margin: 2rem auto;
    }
    .auth-toggle {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 Task Manager</h1>
      <p id="header-subtitle">Simple task tracking interface</p>
      <div id="auth-controls" class="auth-controls hidden">
        <span id="user-greeting"></span>
        <button id="btn-logout" class="btn btn-secondary" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; margin-left: 0.5rem;">Выйти</button>
      </div>
    </header>

    <!-- Auth Forms Container -->
    <div id="auth-view" class="auth-container">
      
      <!-- Login Form -->
      <div id="login-card" class="card">
        <h2>Вход</h2>
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required />
          </div>
          <div class="form-group">
            <label for="login-password">Пароль</label>
            <input type="password" id="login-password" required />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
        </form>
        <div class="auth-toggle">
          Нет аккаунта? <button class="btn-link" onclick="toggleAuth('register')">Зарегистрироваться</button>
        </div>
      </div>

      <!-- Register Form -->
      <div id="register-card" class="card hidden">
        <h2>Регистрация</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="register-name">Имя</label>
            <input type="text" id="register-name" required />
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" required />
          </div>
          <div class="form-group">
            <label for="register-password">Пароль</label>
            <input type="password" id="register-password" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
        </form>
        <div class="auth-toggle">
          Уже есть аккаунт? <button class="btn-link" onclick="toggleAuth('login')">Войти</button>
        </div>
      </div>

    </div>

    <!-- Main App Container -->
    <div id="app-view" class="hidden">
      <!-- Create Form -->
      <div class="card">
        <h2>Новая задача</h2>
        <form id="create-form">
          <div class="form-group">
            <label for="title">Заголовок *</label>
            <input type="text" id="title" placeholder="Что нужно сделать?" required />
          </div>
          <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" placeholder="Подробности (необязательно)…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">＋ Создать задачу</button>
        </form>
      </div>

      <!-- Filters -->
      <div class="filters">
        <label for="filter-status">Фильтр:</label>
        <select id="filter-status">
          <option value="">Все статусы</option>
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
        <label for="filter-sort" style="margin-left:0.5rem;">Сортировка:</label>
        <select id="filter-sort">
          <option value="desc">Сначала новые</option>
          <option value="asc">Сначала старые</option>
        </select>
      </div>

      <!-- Tasks -->
      <div id="tasks-list"></div>

      <!-- Pagination -->
      <div id="pagination" class="pagination hidden">
        <button id="btn-prev" class="btn btn-secondary">← Назад</button>
        <span id="page-info">Страница 1 из 1</span>
        <button id="btn-next" class="btn btn-secondary">Вперед →</button>
      </div>
    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <script>
    const API = '';  // same origin, empty base URL
    let token = localStorage.getItem('token') || null;
    let currentPage = 1;
    const itemsPerPage = 5;

    // ── Helpers ─────────────────────────────────────────────────────────
    function showToast(msg, ms = 2500) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms);
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString('ru-RU', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    const STATUS_LABEL = {
      todo: 'To Do',
      in_progress: 'In Progress',
      done: 'Done',
    };

    function badgeClass(status) {
      return `badge badge-${status}`;
    }

    function getAuthHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      };
    }

    function handleUnauthorized(err, res) {
      if (res && res.status === 401) {
        logout();
        showToast('Сессия истекла. Пожалуйста, войдите снова.');
      } else {
        showToast(`Ошибка: ${err.message || 'Что-то пошло не так'}`);
      }
    }

    // ── Auth Logic ───────────────────────────────────────────────────────
    function toggleAuth(view) {
      if (view === 'login') {
        document.getElementById('login-card').classList.remove('hidden');
        document.getElementById('register-card').classList.add('hidden');
      } else {
        document.getElementById('login-card').classList.add('hidden');
        document.getElementById('register-card').classList.remove('hidden');
      }
    }

    function setToken(newToken) {
      token = newToken;
      localStorage.setItem('token', token);
      checkAuth();
    }

    function logout() {
      token = null;
      localStorage.removeItem('token');
      checkAuth();
    }

    function checkAuth() {
      if (token) {
        document.getElementById('auth-view').classList.add('hidden');
        document.getElementById('app-view').classList.remove('hidden');
        document.getElementById('auth-controls').classList.remove('hidden');
        document.getElementById('header-subtitle').classList.add('hidden');
        loadTasks();
      } else {
        document.getElementById('auth-view').classList.remove('hidden');
        document.getElementById('app-view').classList.add('hidden');
        document.getElementById('auth-controls').classList.add('hidden');
        document.getElementById('header-subtitle').classList.remove('hidden');
      }
    }

    document.getElementById('btn-logout').addEventListener('click', logout);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const param = document.getElementById('login-password').value;
      
      const formData = new URLSearchParams();
      formData.append('username', email); // OAuth2PasswordRequestForm expects username
      formData.append('password', param);

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData.toString()
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        const data = await res.json();
        setToken(data.access_token);
        showToast('Успешный вход!');
      } catch (err) {
        showToast(`Ошибка входа: ${err.message}`);
      }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('register-name').value;
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || `HTTP ${res.status}`);
        }

        showToast('Успешная регистрация! Теперь вы можете войти.');
        toggleAuth('login');
      } catch (err) {
        showToast(`Ошибка регистрации: ${err.message}`);
      }
    });


    // ── Render Tasks ─────────────────────────────────────────────────────
    function renderTask(task) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.dataset.id = task.id;
      card.dataset.status = task.status;

      card.innerHTML = `
        <div class="task-title">${escHtml(task.title)}</div>
        <div class="task-actions">
          <select class="status-select" aria-label="Изменить статус">
            <option value="todo"        ${task.status === 'todo'        ? 'selected' : ''}>To Do</option>
            <option value="in_progress" ${task.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
            <option value="done"        ${task.status === 'done'        ? 'selected' : ''}>Done</option>
          </select>
          <button class="btn btn-danger" aria-label="Удалить задачу">🗑 Удалить</button>
        </div>
        <div class="task-desc">${task.description ? escHtml(task.description) : '<em style="color:#d1d5db">Без описания</em>'}</div>
        <div class="task-meta">
          <span class="${badgeClass(task.status)}">${STATUS_LABEL[task.status]}</span>
          &nbsp;·&nbsp; ${formatDate(task.created_at)}
        </div>
      `;

      // Status change
      card.querySelector('.status-select').addEventListener('change', async (e) => {
        await patchTask(task.id, e.target.value, card);
      });

      // Delete
      card.querySelector('.btn-danger').addEventListener('click', async () => {
        await deleteTask(task.id, card);
      });

      return card;
    }

    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── API calls (Tasks) ────────────────────────────────────────────────
    async function loadTasks() {
      if (!token) return;
      const status = document.getElementById('filter-status').value;
      const sort   = document.getElementById('filter-sort').value;

      const offset = (currentPage - 1) * itemsPerPage;
      const params = new URLSearchParams({ 
        sort,
        limit: itemsPerPage,
        offset: offset
      });
      if (status) params.set('status', status);

      try {
        const res = await fetch(`${API}/tasks/?${params}`, {
          headers: getAuthHeaders()
        });
        if (!res.ok) {
           const err = await res.json().catch(() => ({}));
           handleUnauthorized(err, res);
           return;
        }
        const data = await res.json();
        // Since backend pagination returns `{ items, total, limit, offset }`
        renderList(data.items);
        renderPagination(data.total);
      } catch (err) {
        showToast(`Ошибка загрузки: ${err.message}`);
      }
    }

    function renderPagination(total) {
      const pagContainer = document.getElementById('pagination');
      if (total === 0) {
        pagContainer.classList.add('hidden');
        return;
      }
      pagContainer.classList.remove('hidden');

      const totalPages = Math.ceil(total / itemsPerPage) || 1;
      
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const pageInfo = document.getElementById('page-info');

      pageInfo.textContent = `Страница ${currentPage} из ${totalPages}`;

      btnPrev.disabled = currentPage <= 1;
      btnNext.disabled = currentPage >= totalPages;
    }

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadTasks();
      }
    });

    document.getElementById('btn-next').addEventListener('click', () => {
      currentPage++;
      loadTasks();
    });

    function renderList(tasks) {
      const list = document.getElementById('tasks-list');
      list.innerHTML = '';
      if (tasks.length === 0) {
        list.innerHTML = '<div class="empty"><span>🗒️</span>Задач пока нет. Создайте первую!</div>';
        return;
      }
      tasks.forEach(t => list.appendChild(renderTask(t)));
    }

    async function createTask(title, description) {
      const body = { title };
      if (description.trim()) body.description = description.trim();

      const res = await fetch(`${API}/tasks/`, {
        method: 'POST',
        headers: getAuthHeaders(),
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        handleUnauthorized(err, res);
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function patchTask(id, status, card) {
      try {
        const res = await fetch(`${API}/tasks/${id}`, {
          method: 'PATCH',
          headers: getAuthHeaders(),
          body: JSON.stringify({ status }),
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            handleUnauthorized(err, res);
            throw new Error(err.detail || `HTTP ${res.status}`);
        }
        const updated = await res.json();

        // update badge and border
        card.dataset.status = updated.status;
        const badge = card.querySelector('.badge');
        badge.className = badgeClass(updated.status);
        badge.textContent = STATUS_LABEL[updated.status];

        showToast(`Статус обновлён → ${STATUS_LABEL[updated.status]}`);
      } catch (err) {
        // revert select
        card.querySelector('.status-select').value = card.dataset.status;
      }
    }

    async function deleteTask(id, card) {
      if (!confirm('Удалить задачу?')) return;
      try {
        const res = await fetch(`${API}/tasks/${id}`, { 
          method: 'DELETE',
          headers: getAuthHeaders() 
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            handleUnauthorized(err, res);
            throw new Error(err.detail || `HTTP ${res.status}`);
        }
        card.style.transition = 'opacity 0.3s, transform 0.3s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(20px)';
        setTimeout(() => card.remove(), 300);
        showToast('Задача удалена');
      } catch (err) {
         // errors logged from handleUnauthorized inside delete
      }
    }

    // ── Form submit ──────────────────────────────────────────────────────
    document.getElementById('create-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const titleEl = document.getElementById('title');
      const descEl  = document.getElementById('description');
      const btn = e.target.querySelector('button[type=submit]');

      btn.disabled = true;
      btn.textContent = 'Сохранение…';

      try {
        await createTask(titleEl.value.trim(), descEl.value);
        titleEl.value = '';
        descEl.value  = '';
        showToast('Задача создана ✓');
        // Reset to first page so the user sees the new task (assuming sort: desc)
        currentPage = 1;
        await loadTasks();
      } catch (err) {
        // handled in createTask
      } finally {
        btn.disabled = false;
        btn.textContent = '＋ Создать задачу';
      }
    });

    // ── Filters ──────────────────────────────────────────────────────────
    function onFilterChange() {
      currentPage = 1;
      loadTasks();
    }
    document.getElementById('filter-status').addEventListener('change', onFilterChange);
    document.getElementById('filter-sort').addEventListener('change', onFilterChange);

    // ── Init ─────────────────────────────────────────────────────────────
    checkAuth();
  </script>
</body>
</html>
